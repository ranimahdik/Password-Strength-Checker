<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Guard | Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <i class="fas fa-shield-halved logo-icon"></i>
                <h1>Password Strength Checker</h1>
                <p>Secure your digital identity</p>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Enter your password...">
                <i class="fas fa-eye" id="togglePassword"></i>
            </div>

            <div class="strength-meter">
                <div class="bar-container">
                    <div id="strength-bar"></div>
                </div>
                <div class="strength-text">Strength: <span id="strength-label">Too Short</span></div>
            </div>

            <ul class="checklist">
                <li class="requirement" data-type="length">                    <i class="fas fa-circle"></i> At least 8 characters
                </li>
                <li class="requirement" data-type="uppercase">
                    <i class="fas fa-circle"></i> One uppercase letter
                </li>
                <li class="requirement" data-type="number">
                    <i class="fas fa-circle"></i> One number (0-9)
                </li>
                <li class="requirement" data-type="special">
                    <i class="fas fa-circle"></i> One special character (@$!%*?)
                </li>            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
